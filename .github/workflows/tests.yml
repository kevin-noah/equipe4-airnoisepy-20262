# GitHub Actions — lance pytest à chaque push et pull request sur main.
# Le badge d'état peut être affiché dans le README :
# ![Tests](https://github.com/kevin-noah/equipe4-airnoisepy-20262/actions/workflows/tests.yml/badge.svg)

name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v5

      - name: Installer Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Installer les dépendances
        run: |
          python -m pip install --upgrade pip
          pip install numpy pandas scipy matplotlib folium requests openpyxl rasterio imageio pytest ruff

      - name: Lint (ruff)
        run: ruff check airnoisepy/ tests/

      - name: Lancer la suite de tests
        run: python -m pytest tests/ -v

      # Vérifie que `pip install.` fonctionne — ce que fera le prof.
      # Non bloquant tant que pyproject.toml (Laura) n'est pas rempli :
      # retirer continue-on-error quand il le sera.
      - name: Vérifier l'installation du package
        continue-on-error: true
        run: |
          pip install .
          python -c "import airnoisepy; print('airnoisepy importé depuis le package installé')"
